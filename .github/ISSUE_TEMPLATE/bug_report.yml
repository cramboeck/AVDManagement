name: Bug Report
description: Report a bug or unexpected behavior in the Cloud Management Portal
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Bitte beschreibe den Fehler so präzise wie möglich, damit Claude Code oder Manus ihn schnell beheben können.
        Du kannst Claude Code direkt im Issue taggen (z.B. `@claude behebe diesen Fehler`).
  - type: textarea
    id: expected_behavior
    attributes:
      label: Erwartetes Verhalten
      description: Was hätte passieren sollen?
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Tatsächliches Verhalten
      description: Was ist stattdessen passiert? (Bitte Fehlermeldungen oder Logs beifügen)
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Schritte zur Reproduktion
      description: Wie können wir den Fehler reproduzieren?
      placeholder: |
        1. Gehe auf die Seite 'AVD Sessions'
        2. Klicke auf 'Disconnect' bei Session X
        3. Fehler '500 Internal Server Error' erscheint...
    validations:
      required: true
